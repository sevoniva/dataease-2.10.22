name: Build DataEase Image to GHCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish'
        required: true
        default: '2.10.22-ob'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sevoniva/dataease-2.10.22

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: core/core-frontend/package-lock.json

      - name: Build frontend
        working-directory: core/core-frontend
        run: |
          npm ci
          npm run build:base

      - name: Build backend
        run: |
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd core
          mvn clean package -Pstandalone -DskipTests -Dmaven.test.skip=true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}
