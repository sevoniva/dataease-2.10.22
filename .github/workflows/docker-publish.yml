name: Build and Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: DataEase image tag to publish
        required: false
        default: v2.10.22-ob

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ inputs.image_tag || 'v2.10.22-ob' }}
  SOURCE_DATAEASE_TAG: v2.10.22
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sevoniva/dataease-2.10.22

jobs:
  mirror-base:
    name: Mirror JRE base image
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Mirror JRE base image to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin
          skopeo copy --all \
            docker://registry.cn-qingdao.aliyuncs.com/dataease/alpine-openjdk21-jre:latest \
            docker://${IMAGE_PREFIX}-openjdk21-jre:latest

  mirror-runtime:
    name: Mirror runtime image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - source: registry.cn-qingdao.aliyuncs.com/dataease/mysql:8.4.5
            target: ghcr.io/sevoniva/dataease-2.10.22-mysql:8.4.5
          - source: registry.cn-qingdao.aliyuncs.com/dataease/dataease-sync-task:v2.10.22
            target: ghcr.io/sevoniva/dataease-2.10.22-sync-task:v2.10.22-ob
          - source: registry.cn-qingdao.aliyuncs.com/dataease/de-playwright-api:v1.58.2-noble-0421
            target: ghcr.io/sevoniva/dataease-2.10.22-playwright-api:v1.58.2-noble-0421
          - source: registry.cn-qingdao.aliyuncs.com/dataease/apisix-dashboard:3.0.1-alpine
            target: ghcr.io/sevoniva/dataease-2.10.22-apisix-dashboard:3.0.1-alpine
          - source: registry.cn-qingdao.aliyuncs.com/dataease/apisix:3.14.1-debian
            target: ghcr.io/sevoniva/dataease-2.10.22-apisix:3.14.1-debian
          - source: registry.cn-qingdao.aliyuncs.com/dataease/etcd:3.5.10
            target: ghcr.io/sevoniva/dataease-2.10.22-etcd:3.5.10
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Mirror image to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin
          skopeo copy --all \
            docker://${{ matrix.image.source }} \
            docker://${{ matrix.image.target }}

  build-dataease:
    name: Build and publish DataEase image
    runs-on: ubuntu-latest
    needs:
      - mirror-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            core/core-frontend/package-lock.json
            core/core-frontend/flushbonading/package-lock.json

      - name: Build frontend
        working-directory: core/core-frontend
        run: |
          npm ci
          npm run build:base

      - name: Build backend
        run: |
          mvn clean install -DskipTests -Dmaven.test.skip=true
          mvn -f core/pom.xml clean package -Pstandalone -DskipTests -Dmaven.test.skip=true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push DataEase image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/sevoniva/dataease-2.10.22
            org.opencontainers.image.description=DataEase 2.10.22 fork with OceanBase Oracle support
            org.opencontainers.image.licenses=GPL-3.0
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}:main
            ${{ env.IMAGE_PREFIX }}:sha-${{ github.sha }}
