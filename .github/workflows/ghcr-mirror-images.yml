name: Mirror Runtime Images to GHCR

on:
  workflow_dispatch:
    inputs:
      dataease_tag:
        description: 'DataEase release tag to mirror for dataease-sync-task'
        required: true
        default: 'v2.10.22'

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Mirror images
        run: |
          set -euo pipefail
          mirror() {
            src="$1"
            dst="$2"
            skopeo copy --all "docker://${src}" "docker://${dst}"
          }

          mirror registry.cn-qingdao.aliyuncs.com/dataease/alpine-openjdk21-jre:latest ghcr.io/sevoniva/dataease-2.10.22-openjdk21-jre:latest
          mirror registry.cn-qingdao.aliyuncs.com/dataease/mysql:8.4.5 ghcr.io/sevoniva/dataease-2.10.22-mysql:8.4.5
          mirror registry.cn-qingdao.aliyuncs.com/dataease/dataease-sync-task:${{ github.event.inputs.dataease_tag }} ghcr.io/sevoniva/dataease-2.10.22-sync-task:${{ github.event.inputs.dataease_tag }}
          mirror registry.cn-qingdao.aliyuncs.com/dataease/de-playwright-api:v1.58.2-noble-0421 ghcr.io/sevoniva/dataease-2.10.22-playwright-api:v1.58.2-noble-0421
          mirror registry.cn-qingdao.aliyuncs.com/dataease/apisix-dashboard:3.0.1-alpine ghcr.io/sevoniva/dataease-2.10.22-apisix-dashboard:3.0.1-alpine
          mirror registry.cn-qingdao.aliyuncs.com/dataease/apisix:3.14.1-debian ghcr.io/sevoniva/dataease-2.10.22-apisix:3.14.1-debian
          mirror registry.cn-qingdao.aliyuncs.com/dataease/etcd:3.5.10 ghcr.io/sevoniva/dataease-2.10.22-etcd:3.5.10
